<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生窗口 · 高密度决策台</title>
  <meta
    name="description"
    content="基于人生窗口数据的高密度信息可视化决策页面，支持年龄切片、状态筛选、维度分布与详情展开。"
  />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="bg-glow glow-a" aria-hidden="true"></div>
  <div class="bg-glow glow-b" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">LIFE WINDOW STRATEGY</p>
      <h1>人生窗口 · 高密度决策台</h1>
      <p class="hero-copy">一页读懂人生窗口状态、时间窗口与行动优先级，支持手机端快速扫描与决策。</p>

      <section class="control-bar" aria-label="筛选和时间控制">
        <div class="control-age">
          <div>
            <p class="meta-label">当前年龄</p>
            <div class="age-display"><span id="ageValue">30</span><span>岁</span></div>
            <p id="lifeStage" class="life-stage">成家立业期</p>
          </div>
          <div class="age-buttons" aria-label="常用年龄节点">
            <button type="button" class="age-chip" data-age="16">16</button>
            <button type="button" class="age-chip" data-age="22">22</button>
            <button type="button" class="age-chip" data-age="30">30</button>
            <button type="button" class="age-chip" data-age="40">40</button>
            <button type="button" class="age-chip" data-age="50">50</button>
            <button type="button" class="age-chip" data-age="65">65</button>
          </div>
        </div>

        <div class="control-slider">
          <label for="ageSlider" class="meta-label">拖动更新年龄切片</label>
          <div class="age-range-hint"><span>0</span><span>90</span></div>
          <input id="ageSlider" class="age-slider" type="range" min="0" max="90" value="30" />
        </div>

        <div class="control-filters">
          <label class="field">
            <span class="meta-label">搜索</span>
            <input id="searchInput" type="search" placeholder="关键词：学习、资产、婚恋、迁移..." />
          </label>
          <label class="field">
            <span class="meta-label">维度</span>
            <select id="categorySelect">
              <option value="all">全部维度</option>
              <option value="health">生理健康</option>
              <option value="career">学业职业</option>
              <option value="finance">财富资产</option>
              <option value="relation">亲密家庭</option>
              <option value="spirit">精神成长</option>
              <option value="risk">风险兜底</option>
            </select>
          </label>
          <label class="field">
            <span class="meta-label">状态</span>
            <select id="statusSelect">
              <option value="all">全部</option>
              <option value="gold">现在做</option>
              <option value="warning">快关闭</option>
              <option value="risk">高代价补救</option>
              <option value="early">提前布局</option>
              <option value="close">已关闭</option>
            </select>
          </label>
          <label class="field">
            <span class="meta-label">排序</span>
            <select id="sortSelect">
              <option value="priority">优先级</option>
              <option value="close">关闭年龄优先</option>
              <option value="lock">锁死强度优先</option>
              <option value="category">维度优先</option>
            </select>
          </label>
        </div>
      </section>

      <div class="hero-actions">
        <button class="btn primary" id="resetBtn" type="button">重置筛选</button>
        <label class="switcher" for="lockOnly">
          <input id="lockOnly" type="checkbox" />
          <span>只看高锁死窗口（>=80%）</span>
        </label>
      </div>
    </header>

    <section class="kpi-grid" id="kpiGrid" aria-live="polite"></section>

    <main class="content-grid">
      <section class="panel">
        <div class="panel-head">
          <h2>高优先窗口</h2>
          <p>当前最值得立即决策的窗口</p>
        </div>
        <div id="focusList" class="focus-list"></div>
      </section>

      <section class="panel wide">
        <div class="panel-head">
          <h2>密集决策表</h2>
          <p id="resultStat"></p>
        </div>
        <div id="denseList" class="dense-list" role="list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>维度热力</h2>
          <p>各领域当前压力占比</p>
        </div>
        <div id="dimensionGrid" class="dimension-grid"></div>
      </section>
    </main>
  </div>

  <section id="detailPanel" class="detail-panel" aria-hidden="true">
    <article class="detail-card">
      <button id="detailClose" class="detail-close" type="button" aria-label="关闭">×</button>
      <div id="detailContent"></div>
    </article>
  </section>

  <script src="assets/js/data-full.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
