<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生时间窗口导航系统</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <!-- 新手引导弹窗 -->
  <div id="onboardingMask" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl text-center">
      <div class="text-4xl mb-3" id="onboardingIcon">👋</div>
      <h2 class="text-lg font-bold text-gray-800 mb-2" id="onboardingTitle">欢迎使用人生时间窗口</h2>
      <p class="text-gray-500 text-sm mb-4" id="onboardingDesc">40个关键人生窗口，帮你找到每件事的最优时机</p>
      <div class="flex justify-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-sky-500 onboarding-dot" data-step="0"></div>
        <div class="w-2 h-2 rounded-full bg-gray-200 onboarding-dot" data-step="1"></div>
        <div class="w-2 h-2 rounded-full bg-gray-200 onboarding-dot" data-step="2"></div>
      </div>
      <div class="flex gap-2">
        <button id="onboardingSkip" class="btn btn-sm btn-ghost flex-1">跳过</button>
        <button id="onboardingNext" class="btn btn-sm btn-primary flex-1">下一步</button>
      </div>
    </div>
  </div>

  <!-- 顶部固定栏 -->
  <div class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between gap-6">
        <div class="flex items-center gap-4">
          <h1 class="text-lg font-bold text-gray-800 whitespace-nowrap">人生时间窗口</h1>
          <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg">
            <div class="flex items-center gap-1.5">
              <button class="text-xs font-medium text-sky-600 bg-white px-2.5 py-1 rounded-full shadow-sm status-filter-btn" data-status="gold">黄金期</button>
              <button class="text-xs font-medium text-amber-600 bg-white px-2.5 py-1 rounded-full shadow-sm status-filter-btn" data-status="warning">即将关闭</button>
              <button class="text-xs font-medium text-gray-600 bg-white px-2.5 py-1 rounded-full shadow-sm status-filter-btn" data-status="early">即将开启</button>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex gap-1 flex-shrink-0">
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="0">0</button>
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="20">20</button>
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="30">30</button>
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="40">40</button>
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="50">50</button>
            <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="60">60</button>
          </div>
          <div class="flex items-center gap-1.5 flex-shrink-0">
            <input type="range" min="0" max="80" value="30" class="w-32" id="ageSlider" />
            <span class="text-xl font-bold text-sky-600" id="ageDisplay">30</span>
            <span class="text-sm text-gray-500">岁</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-6">
    <!-- 黄金期 - 最重要的 -->
    <div id="goldSection" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-3 h-3 rounded-full bg-sky-500"></div>
        <h2 class="text-xl font-bold text-gray-800">现在该做的事 <span class="text-sm font-normal text-gray-500 ml-2" id="goldCount">(0个)</span></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="goldCards"></div>
    </div>

    <!-- 即将关闭 - 紧急 -->
    <div id="warningSection" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
        <h2 class="text-xl font-bold text-amber-600">快来不及了 <span class="text-sm font-normal text-gray-500 ml-2" id="warningCount">(0个)</span></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="warningCards"></div>
    </div>

    <!-- 即将开启 - 规划 -->
    <div id="earlySection" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-3 h-3 rounded-full bg-purple-400"></div>
        <h2 class="text-xl font-bold text-purple-600">即将开启 <span class="text-sm font-normal text-gray-500 ml-2" id="earlyCount">(0个)</span></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="earlyCards"></div>
    </div>

    <!-- 其他状态 - 折叠 -->
    <div class="mb-8">
      <button id="toggleOthersBtn" class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 mb-4">
        <span>查看其他窗口</span>
        <svg id="toggleIcon" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </button>
      <div id="othersSection" class="hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="othersCards"></div>
      </div>
    </div>

    <!-- 维度概览 -->
    <div class="bg-white rounded-xl p-5 shadow-sm mb-8">
      <h3 class="text-sm font-semibold text-gray-800 mb-4">各维度完成度</h3>
      <div class="grid grid-cols-6 gap-3" id="radarGrid"></div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-mask fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" id="modalMask">
    <div class="modal-content bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl" id="modalContent"></div>
  </div>

  <!-- 数据 + 主应用 JS -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
