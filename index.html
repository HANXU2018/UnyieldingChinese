<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生时间窗口导航系统</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- 用户信息区 -->
  <div class="bg-gradient-to-r from-sky-500 to-indigo-600 text-white shadow-xl mx-4 mt-4 rounded-2xl p-6 animate-fadeInUp">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">人生时间窗口导航系统</h1>
      <span class="bg-white/20 px-4 py-1 rounded-full text-sm">人生没有标准答案，但有最优时机</span>
    </div>
    <div class="grid grid-cols-4 gap-4 text-center">
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4">
        <div class="text-3xl font-bold" id="goldNum">0</div>
        <div class="text-xs mt-1 opacity-90">黄金期</div>
      </div>
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4">
        <div class="text-3xl font-bold" id="warningNum">0</div>
        <div class="text-xs mt-1 opacity-90">即将关闭</div>
      </div>
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4">
        <div class="text-3xl font-bold" id="earlyNum">0</div>
        <div class="text-xs mt-1 opacity-90">提前风险</div>
      </div>
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4">
        <div class="text-3xl font-bold" id="closeNum">0</div>
        <div class="text-xs mt-1 opacity-90">已关闭</div>
      </div>
    </div>
  </div>

  <!-- 维度雷达图区 -->
  <div class="bg-white shadow-lg mx-4 mt-4 rounded-2xl p-6 animate-fadeInUp">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold text-gray-800">人生维度完成度</h3>
      <span class="text-sm text-gray-500" id="lifeStage">人生阶段：职场新人期</span>
    </div>
    <div class="grid grid-cols-6 gap-4" id="radarGrid">
      <!-- 动态生成 -->
    </div>
  </div>

  <!-- 年龄滑块区域 -->
  <div class="bg-white shadow-lg mx-4 mt-4 rounded-2xl p-6 animate-fadeInUp">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-lg font-semibold text-gray-800 mb-1">调节观测年龄锚点</h2>
        <div class="text-sm text-gray-500">拖动滑块查看不同年龄的窗口状态</div>
      </div>
      <div class="text-4xl font-bold bg-gradient-to-r from-sky-500 to-indigo-600 bg-clip-text text-transparent">
        <span id="ageDisplay">30</span><span class="text-lg font-medium">岁</span>
      </div>
    </div>
    <div class="flex gap-3 mb-6 flex-wrap">
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="0">0岁</button>
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="18">18岁</button>
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="25">25岁</button>
      <button class="btn btn-sm btn-primary quick-jump active" data-age="30">30岁</button>
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="40">40岁</button>
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="50">50岁</button>
      <button class="btn btn-sm btn-ghost bg-gray-100 hover:bg-sky-500 hover:text-white transition-all duration-200 quick-jump" data-age="60">60岁</button>
    </div>
    <input
      type="range"
      min="0"
      max="80"
      value="30"
      class="w-full"
      id="ageSlider"
    />
    <div class="flex justify-between text-sm text-gray-500 mt-3">
      <span>0岁</span>
      <span>40岁</span>
      <span>80岁</span>
    </div>
  </div>

  <!-- 全景时间轴 -->
  <div class="bg-white shadow-lg mx-4 mt-4 rounded-2xl p-6 animate-fadeInUp">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold text-gray-800">全景时间轴</h3>
      <div class="flex gap-6 text-xs">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-sky-500"></div>
          <span>黄金期</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-amber-500"></div>
          <span>即将关闭</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
          <span>提前风险</span>
        </div>
      </div>
    </div>
    <div class="relative h-24 overflow-x-auto mb-3" id="timelineContainer">
      <div class="relative h-16 bg-gray-200 rounded-lg min-w-full" id="timelineTrack">
        <!-- 动态生成时间轴窗口 -->
      </div>
      <div class="timeline-cursor absolute top-0 w-0.5 h-20 bg-sky-500 z-20" id="timelineCursor"></div>
    </div>
    <div class="flex justify-between text-xs text-gray-500">
      <span>0岁</span>
      <span>20岁</span>
      <span>40岁</span>
      <span>60岁</span>
      <span>80岁</span>
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="bg-white shadow-lg mx-4 mt-4 rounded-2xl p-4 animate-fadeInUp">
    <div class="flex flex-wrap gap-3">
      <div class="flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-primary filter-btn" data-filter="all">全部</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="health">生理健康</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="career">学业职业</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="finance">财富资产</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="relation">亲密家庭</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="spirit">精神成长</button>
        <button class="btn btn-sm btn-ghost filter-btn" data-filter="risk">风险兜底</button>
      </div>
      <div class="w-px bg-gray-200"></div>
      <div class="flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-outline border-sky-500 text-sky-500 hover:bg-sky-500 hover:text-white filter-btn" data-status="gold">仅黄金期</button>
        <button class="btn btn-sm btn-outline border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-white filter-btn" data-status="warning">预警</button>
        <button class="btn btn-sm btn-outline border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-white filter-btn" data-status="early">提前</button>
        <button class="btn btn-sm btn-outline border-red-500 text-red-500 hover:bg-red-500 hover:text-white filter-btn" data-status="close">已关闭</button>
      </div>
    </div>
  </div>

  <!-- 卡片网格 -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mx-4 mt-4 mb-8" id="cardGrid">
    <!-- 动态生成卡片 -->
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-mask fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" id="modalMask">
    <div class="modal-content bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl" id="modalContent">
      <!-- 弹窗内容由JS动态生成 -->
    </div>
  </div>

  <!-- 主应用 JS -->
  <script src="assets/js/app.js"></script>
</body>
</html>
