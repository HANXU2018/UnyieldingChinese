<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生时间窗口导航系统</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-100 min-h-screen">
  <!-- 新手引导弹窗 -->
  <div id="onboardingMask" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl text-center">
      <div class="text-4xl mb-3" id="onboardingIcon">👋</div>
      <h2 class="text-lg font-bold text-gray-800 mb-2" id="onboardingTitle">欢迎使用人生时间窗口</h2>
      <p class="text-gray-500 text-sm mb-4" id="onboardingDesc">40个关键人生窗口，帮你找到每件事的最优时机</p>
      <div class="flex justify-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-sky-500 onboarding-dot" data-step="0"></div>
        <div class="w-2 h-2 rounded-full bg-gray-200 onboarding-dot" data-step="1"></div>
        <div class="w-2 h-2 rounded-full bg-gray-200 onboarding-dot" data-step="2"></div>
      </div>
      <div class="flex gap-2">
        <button id="onboardingSkip" class="btn btn-sm btn-ghost flex-1">跳过</button>
        <button id="onboardingNext" class="btn btn-sm btn-primary flex-1">下一步</button>
      </div>
    </div>
  </div>

  <!-- 顶部固定栏 -->
  <div class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <h1 class="text-lg font-bold text-gray-800 whitespace-nowrap">人生时间窗口</h1>
          <span class="text-[10px] text-gray-500 bg-slate-100 px-2 py-0.5 rounded-full">40节点</span>
        </div>
        <div class="flex-1 min-w-0 mx-4">
          <div class="flex items-center gap-3">
            <div class="flex gap-1 flex-shrink-0">
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="0">0</button>
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="18">18</button>
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="25">25</button>
              <button class="btn btn-xs btn-primary quick-jump px-2" data-age="30">30</button>
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="40">40</button>
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="50">50</button>
              <button class="btn btn-xs btn-ghost quick-jump px-2" data-age="60">60</button>
            </div>
            <div class="flex-1 min-w-0 flex items-center gap-3">
              <input type="range" min="0" max="80" value="30" class="w-full" id="ageSlider" />
              <div class="flex items-center gap-1 flex-shrink-0">
                <span class="text-2xl font-bold text-sky-600" id="ageDisplay">30</span>
                <span class="text-xs text-gray-500">岁</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
    <!-- 维度进度 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <div class="flex justify-between items-center mb-3">
        <h3 class="text-sm font-semibold text-gray-800">维度完成度</h3>
        <span class="text-xs text-gray-500" id="lifeStage">职场新人期</span>
      </div>
      <div class="grid grid-cols-6 gap-2" id="radarGrid"></div>
    </div>

    <!-- 时间轴表格 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <h3 class="text-sm font-semibold text-gray-800 mb-3">窗口时间轴</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="text-left py-2 px-2 text-gray-500 font-medium">窗口</th>
              <th class="text-center py-2 px-1 text-gray-500 font-medium">0</th>
              <th class="text-center py-2 px-1 text-gray-500 font-medium">20</th>
              <th class="text-center py-2 px-1 text-gray-500 font-medium">40</th>
              <th class="text-center py-2 px-1 text-gray-500 font-medium">60</th>
              <th class="text-center py-2 px-1 text-gray-500 font-medium">80</th>
              <th class="text-center py-2 px-2 text-gray-500 font-medium">状态</th>
            </tr>
          </thead>
          <tbody id="timelineTable"></tbody>
        </table>
      </div>
      <div class="flex gap-4 mt-2 text-xs text-gray-500">
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded bg-sky-500"></div><span>黄金期</span></div>
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded bg-amber-500"></div><span>预警</span></div>
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded bg-yellow-400"></div><span>提前</span></div>
      </div>
    </div>

    <!-- 统计面板 -->
    <div class="grid grid-cols-4 gap-2">
      <div class="bg-gradient-to-br from-sky-500 to-sky-600 text-white rounded-lg p-3 text-center">
        <div class="text-2xl font-bold" id="goldNum">0</div>
        <div class="text-xs opacity-90">黄金期</div>
      </div>
      <div class="bg-gradient-to-br from-amber-500 to-amber-600 text-white rounded-lg p-3 text-center">
        <div class="text-2xl font-bold" id="warningNum">0</div>
        <div class="text-xs opacity-90">即将关闭</div>
      </div>
      <div class="bg-gradient-to-br from-yellow-400 to-yellow-500 text-white rounded-lg p-3 text-center">
        <div class="text-2xl font-bold" id="earlyNum">0</div>
        <div class="text-xs opacity-90">提前风险</div>
      </div>
      <div class="bg-gradient-to-br from-gray-400 to-gray-500 text-white rounded-lg p-3 text-center">
        <div class="text-2xl font-bold" id="closeNum">0</div>
        <div class="text-xs opacity-90">已关闭</div>
      </div>
    </div>

    <!-- 筛选 -->
    <div class="bg-white rounded-xl p-3 shadow-sm">
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-xs btn-primary filter-btn" data-filter="all">全部</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="health">健康</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="career">职业</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="finance">财富</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="relation">家庭</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="spirit">成长</button>
        <button class="btn btn-xs btn-ghost filter-btn" data-filter="risk">风险</button>
        <div class="w-px bg-gray-200"></div>
        <button class="btn btn-xs btn-outline border-sky-500 text-sky-500 hover:bg-sky-500 hover:text-white filter-btn" data-status="gold">黄金</button>
        <button class="btn btn-xs btn-outline border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-white filter-btn" data-status="warning">预警</button>
        <button class="btn btn-xs btn-outline border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-white filter-btn" data-status="early">提前</button>
        <button class="btn btn-xs btn-outline border-red-500 text-red-500 hover:bg-red-500 hover:text-white filter-btn" data-status="close">关闭</button>
      </div>
    </div>

    <!-- 卡片列表 -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3" id="cardGrid"></div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-mask fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" id="modalMask">
    <div class="modal-content bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl" id="modalContent"></div>
  </div>

  <!-- 数据 + 主应用 JS -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
